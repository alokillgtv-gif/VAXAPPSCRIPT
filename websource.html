<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>HTML5 IPTV Player</title><script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script><style>body{background-color:#121212;color:#fff;font-family:sans-serif;text-align:center;padding:20px}#video-container{max-width:800px;margin:0 auto}video{width:100%;border:2px solid #333;border-radius:8px;background-color:#000}</style></head><body><h2>HTML5 Player - Phát luồng IPTV MPEG-TS</h2><div id="video-container"><video id="videoElement" controls autoplay muted></video></div><script>document.addEventListener("DOMContentLoaded",()=>{if(mpegts.js.isSupported()){const e=document.getElementById("videoElement"),t=mpegts.js.createPlayer({type:"mpegts",isLive:!0,url:"https://dl.dropboxusercontent.com/s/o5vygit34v9ryly71gam4/coban66.m3u?rlkey=auyoon54hfubajt16nc7u7dbn&st=70gyvtcu&dl=0"});t.attachMediaElement(e),t.load(),t.play()}else alert("Trình duyệt của bạn không hỗ trợ Media Source Extensions (MSE) để phát luồng này!")})</script></body></html>
