<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Code Debugger & Beautifier</title>

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/scroll/simplescrollbars.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/scroll/simplescrollbars.min.js"></script>

<!-- Acorn Parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/acorn/8.11.3/acorn.min.js"></script>
<!-- JS Beautify -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #0b0c10;
    color: #c5c6c7;
    height: 100vh;
    overflow: hidden;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Topbar */
  .topbar {
    height: 44px;
    background: #1f2833;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    border-bottom: 1px solid #45a29e;
    flex-shrink: 0;
  }
  .topbar h1 {
    font-size: 15px;
    color: #66fcf1;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar .toggles { display: flex; gap: 8px; }
  .topbar button {
    background: #1f2833;
    color: #66fcf1;
    border: 1px solid #45a29e;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.25s;
    font-weight: 500;
  }
  .topbar button:hover {
    background: #45a29e;
    color: #0b0c10;
    border-color: #66fcf1;
  }
  #searchCount {
    font-size: 12px;
    color: #45a29e;
    margin-left: 10px;
    font-weight: 600;
  }

  /* Main Layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .col {
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .col-code {
    flex: 8;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #0b0c10;
  }
  .col-tools {
    flex: 2;
    display: flex;
    flex-direction: column;
    min-width: 260px;
    max-width: 360px;
    background: #1f2833;
    border-left: 1px solid #45a29e;
  }
  .col.collapsed {
    flex: 0 !important;
    min-width: 0 !important;
    width: 0 !important;
    padding: 0 !important;
    border: none !important;
    opacity: 0;
  }

  /* CodeMirror Custom */
  .CodeMirror {
    height: 100%;
    font-size: 14px;
    line-height: 1.5;
    font-family: 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
  }
  .CodeMirror-gutters { background: #1f2833 !important; border-right: 1px solid #45a29e !important; }
  .CodeMirror-linenumber { color: #45a29e !important; padding: 0 8px 0 4px; }

  /* Error line highlight */
  .line-error {
    background: rgba(231, 76, 60, 0.12) !important;
    position: relative;
  }
  .line-error::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #e74c3c;
  }
  .line-error-active {
    background: rgba(231, 76, 60, 0.30) !important;
  }

  /* Search highlight */
  .search-highlight {
    background: #ff4444 !important;
    color: #000000 !important;
    border-radius: 2px;
  }

  /* Tools Sticky Header */
  .tools-sticky {
    padding: 10px;
    background: #1f2833;
    border-bottom: 1px solid #45a29e;
    flex-shrink: 0;
    z-index: 20;
  }
  .tool-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* Tăng thành 5 cột cho cân đối 10 nút */
    gap: 5px;
    margin-bottom: 8px;
  }
  .tool-buttons button {
    background: #0b0c10;
    color: #66fcf1;
    border: 1px solid #45a29e;
    padding: 5px 2px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px; /* Thu nhỏ size một chút để vừa chữ */
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    font-weight: 500;
  }
  .tool-buttons button:hover {
    background: #45a29e;
    color: #0b0c10;
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(102, 252, 241, 0.15);
  }
  .tool-buttons button:active { transform: translateY(0); }

  /* Stats */
  .stats {
    font-size: 11px;
    color: #45a29e;
    text-align: center;
    margin-top: 4px;
    font-weight: 600;
  }

  /* Find & Replace */
  .find-replace {
    display: none;
    flex-direction: column;
    gap: 5px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid #45a29e;
    animation: fadeIn 0.2s ease;
  }
  .find-replace.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .find-replace input {
    background: #0b0c10;
    border: 1px solid #45a29e;
    color: #c5c6c7;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .find-replace input:focus { border-color: #66fcf1; }
  .find-replace label {
    font-size: 11px;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .find-replace label input[type="checkbox"] {
    accent-color: #45a29e;
    width: 13px; height: 13px;
  }
  .fr-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-top: 3px;
  }
  .fr-buttons button {
    background: #162238;
    color: #66fcf1;
    border: 1px solid #45a29e;
    padding: 5px 3px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  .fr-buttons button:hover { background: #45a29e; color: #0b0c10; }

  /* Error Panel */
  .error-panel {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .error-header {
    font-size: 13px;
    font-weight: bold;
    color: #e74c3c;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    position: sticky;
    top: 0;
    background: #1f2833;
    padding: 4px 0;
    z-index: 10;
    border-bottom: 1px solid #45a29e;
  }

  /* Error Group */
  .error-group {
    border: 1px solid #2c3e50;
    border-radius: 6px;
    margin-bottom: 6px;
    overflow: hidden;
    background: #162238;
  }
  .error-group-header {
    padding: 6px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 12px;
    user-select: none;
  }
  .error-group-header:hover { background: #1a2a3a; }
  .error-group-header .badge {
    background: #e74c3c;
    color: #fff;
    padding: 1px 6px;
    border-radius: 9px;
    font-size: 10px;
    font-weight: bold;
    min-width: 18px;
    text-align: center;
  }
  .error-group-header .arrow {
    font-size: 10px;
    color: #45a29e;
    transition: transform 0.2s;
    margin-left: 6px;
  }
  .error-group-header.expanded .arrow { transform: rotate(90deg); }
  .error-group-items {
    display: none;
    background: #0b0c10;
    padding: 4px 8px;
  }
  .error-group-items.active { display: block; }
  .error-group-item {
    padding: 4px 6px;
    font-size: 11.5px;
    color: #c5c6c7;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .error-group-item:hover {
    background: rgba(231, 76, 60, 0.15);
    color: #fff;
  }
  .error-group-item .fix-hint {
    font-size: 10px;
    color: #2ecc71;
    opacity: 0.8;
  }
  .no-error {
    color: #2ecc71;
    font-size: 13px;
    text-align: center;
    margin-top: 20px;
    padding: 16px;
    background: rgba(46, 204, 113, 0.08);
    border-radius: 8px;
    border: 1px dashed #2ecc71;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1f2833;
    color: #66fcf1;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 99999;
    border: 1px solid #45a29e;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0b0c10; }
  ::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 4px; border: 2px solid #0b0c10; }
  ::-webkit-scrollbar-thumb:hover { background: #66fcf1; }

  /* Responsive */
  @media (max-width: 768px) {
    .col-tools { max-width: 100%; min-width: 200px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <h1>🚀 JS Code Debugger <span id="searchCount"></span></h1>
    <div class="toggles">
      <button onclick="toggleCol('colCode')" title="Ẩn / hiện cột code">👈 Code</button>
      <button onclick="toggleCol('colTools')" title="Ẩn / hiện cột công cụ">Công cụ 👉</button>
    </div>
  </div>

  <div class="main">
    <!-- Cột Code (8 phần) -->
    <div class="col col-code" id="colCode">
      <textarea id="codeEditor"></textarea>
    </div>

    <!-- Cột Công cụ (2 phần) -->
    <div class="col col-tools" id="colTools">
      <div class="tools-sticky">
        <div class="tool-buttons">
          <!-- Hàng 1 -->
          <button onclick="checkCode()" title="Kiểm tra lỗi cú pháp & cảnh báo">🔍</button>
          <button onclick="beautifyCode()" title="Làm đẹp & canh chỉnh code">✨</button>
          <button onclick="toggleFindReplace()" title="Tìm & Thay thế">🔎</button>
          <button onclick="copyCode()" title="Copy toàn bộ code">📋</button>
          <button onclick="pasteCode()" title="Paste vào editor">📌</button>
          
          <!-- Hàng 2 (Các tính năng mới) -->
          <button onclick="removeScripts()" title="Xóa toàn bộ thẻ <script>">🚫 JS</button>
          <button onclick="minifyJS()" title="Rút gọn JS thành 1 dòng">📉 JS</button>
          <button onclick="minifyCSS()" title="Rút gọn CSS thành 1 dòng">📉 CSS</button>
          <button onclick="downloadCode()" title="Tải file đang code về máy">💾 Tải</button>
          <button onclick="clearCode()" title="Xóa toàn bộ">🗑</button>
        </div>

        <div class="find-replace" id="findReplacePanel">
          <input type="text" id="frFind" placeholder="Nhập chuỗi cần tìm...">
          <input type="text" id="frReplace" placeholder="Nhập chuỗi thay thế...">
          <label><input type="checkbox" id="frRegex"> Regex</label>
          <label><input type="checkbox" id="frCase" checked> Phân biệt hoa/thường</label>
          <div class="fr-buttons">
            <button onclick="findNext()">⬇ Tìm tiếp</button>
            <button onclick="findPrev()">⬆ Tìm trước</button>
            <button onclick="replaceOne()">🔁 Thay 1</button>
            <button onclick="replaceAll()">🔂 Thay tất</button>
          </div>
        </div>

        <div class="stats" id="stats">0 dòng | 0 ký tự | 0 lỗi</div>
      </div>

      <div class="error-panel" id="errorPanel">
        <div class="error-header">🐛 Lỗi & Cảnh báo</div>
        <div id="errorList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ============================
     KHỞI TẠO EDITOR
     ============================ */
  var editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
    mode: 'javascript',
    theme: 'dracula',
    lineNumbers: true,
    lineWrapping: true,
    indentUnit: 2,
    tabSize: 2,
    autofocus: true,
    scrollbarStyle: 'overlay'
  });

  // Code mẫu để demo
  editor.setValue(``);

  /* ============================
     BIẾN & UTILITIES
     ============================ */
  var activeMarks = [];
  var searchMarks = [];
  var lastCursorPos = null;

  function showToast(msg, duration) {
    duration = duration || 2000;
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, duration);
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function clearEditorErrors() {
    activeMarks.forEach(function(m) { m.clear(); });
    activeMarks = [];
    for (var i = 0; i < editor.lineCount(); i++) {
      editor.removeLineClass(i, 'background', 'line-error');
      editor.removeLineClass(i, 'background', 'line-error-active');
    }
  }

  function clearSearchMarks() {
    searchMarks.forEach(function(m) { m.clear(); });
    searchMarks = [];
  }

  function highlightLine(line, ch) {
    clearEditorErrors();
    editor.addLineClass(line, 'background', 'line-error');
    editor.addLineClass(line, 'background', 'line-error-active');
    editor.setCursor(line, ch || 0);
    editor.scrollIntoView({ line: line, ch: ch || 0 }, 120);
    setTimeout(function() {
      editor.removeLineClass(line, 'background', 'line-error-active');
    }, 2500);
  }

  function updateStats() {
    var lines = editor.lineCount();
    var chars = editor.getValue().length;
    var errCount = 0;
    var badges = document.querySelectorAll('.error-group-header .badge');
    badges.forEach(function(b) { errCount += parseInt(b.textContent) || 0; });
    if (document.querySelector('.no-error')) errCount = 0;
    document.getElementById('stats').textContent = lines + ' dòng | ' + chars + ' ký tự | ' + errCount + ' lỗi/cảnh báo';
  }

  /* ============================
     KIỂM TRA LỖI (LINT)
     ============================ */
  function checkCode() {
    clearEditorErrors();
    clearSearchMarks();
    var code = editor.getValue();
    var list = document.getElementById('errorList');
    list.innerHTML = '';
    var errors = [];
    var lines = code.split('\n');

    // 1. Syntax Check
    try {
      if (typeof acorn !== 'undefined') {
        acorn.parse(code, { ecmaVersion: 'latest', locations: true, sourceType: 'module' });
      } else {
        new Function(code);
      }
    } catch (e) {
      var loc = e.loc || {};
      var line = (loc.line || 1) - 1;
      var col = loc.column || 0;
      errors.push({
        line: line,
        col: col,
        type: 'Syntax Error',
        severity: 'error',
        msg: (e.message || 'Lỗi cú pháp').split('\n')[0],
        fix: 'Kiểm tra cú pháp tại dòng ' + (line + 1) + ', cột ' + col + '. Có thể thiếu dấu đóng ngoặc, dấu chấm phẩy hoặc từ khóa sai.'
      });
    }

    // 2. Lint cơ bản
    if (errors.length === 0) {
      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i];
        var trimmed = raw.trim();
        if (trimmed.startsWith('//') || trimmed.startsWith('/*') || trimmed.startsWith('*')) continue;

        var matchEq = raw.match(/([^=!])==([^=])/);
        if (matchEq) {
          errors.push({ line: i, col: matchEq.index + 1, type: 'Warning', severity: 'warn',
            msg: 'Sử dụng == thay vì ===',
            fix: 'Thay == bằng === để so sánh nghiêm ngặt kiểu dữ liệu.' });
        }

        var matchVar = raw.match(/\bvar\b/);
        if (matchVar) {
          errors.push({ line: i, col: matchVar.index, type: 'Best Practice', severity: 'warn',
            msg: 'Sử dụng var thay vì let/const',
            fix: 'Thay var bằng let hoặc const để tránh rò rỉ phạm vi.' });
        }

        var matchLog = raw.match(/console\.log\s*\(/);
        if (matchLog) {
          errors.push({ line: i, col: matchLog.index, type: 'Cleanup', severity: 'info',
            msg: 'console.log() còn sót lại trong code',
            fix: 'Xóa console.log() trước khi đưa lên production.' });
        }

        var matchEval = raw.match(/\beval\s*\(/);
        if (matchEval) {
          errors.push({ line: i, col: matchEval.index, type: 'Security', severity: 'error',
            msg: 'Sử dụng eval() rất nguy hiểm',
            fix: 'Tránh eval(). Nếu cần parse JSON dùng JSON.parse().' });
        }

        var matchDbg = raw.match(/\bdebugger\b/);
        if (matchDbg) {
          errors.push({ line: i, col: matchDbg.index, type: 'Cleanup', severity: 'warn',
            msg: 'Còn từ khóa debugger',
            fix: 'Xóa debugger trước khi build/release.' });
        }
      }
    }

    // Render: Gom nhóm
    if (errors.length === 0) {
      list.innerHTML = '<div class="no-error">✅ Không phát hiện lỗi nào!<br>Code của bạn sạch và an toàn.</div>';
    } else {
      var groups = {};
      errors.forEach(function(err) {
        var key = err.msg;
        if (!groups[key]) {
          groups[key] = { type: err.type, severity: err.severity, msg: err.msg, fix: err.fix, items: [] };
        }
        groups[key].items.push(err);
      });

      Object.keys(groups).forEach(function(key) {
        var g = groups[key];
        var groupDiv = document.createElement('div');
        groupDiv.className = 'error-group';

        var header = document.createElement('div');
        header.className = 'error-group-header';
        var icon = g.severity === 'error' ? '❌' : g.severity === 'warn' ? '⚠️' : 'ℹ️';
        header.innerHTML = '<span>' + icon + ' ' + escapeHtml(g.msg) + ' <span class="arrow">▶</span></span><span class="badge">' + g.items.length + '</span>';
        header.onclick = function() { toggleGroup(this); };

        var itemsDiv = document.createElement('div');
        itemsDiv.className = 'error-group-items';
        g.items.forEach(function(item) {
          var lineDiv = document.createElement('div');
          lineDiv.className = 'error-group-item';
          lineDiv.innerHTML = '<span>Dòng ' + (item.line + 1) + (item.col ? ', cột ' + item.col : '') + '</span><span class="fix-hint">💡 ' + escapeHtml(g.fix) + '</span>';
          lineDiv.onclick = function(e) { e.stopPropagation(); highlightLine(item.line, item.col); };
          itemsDiv.appendChild(lineDiv);
        });

        groupDiv.appendChild(header);
        groupDiv.appendChild(itemsDiv);
        list.appendChild(groupDiv);

        if (g.items.length === 1) {
          header.classList.add('expanded');
          itemsDiv.classList.add('active');
        }
      });
    }

    updateStats();
    if (errors.length > 0) {
      showToast('🔍 Phát hiện ' + errors.length + ' vấn đề trong code', 3000);
    } else {
      showToast('✅ Code sạch! Không có lỗi.', 2500);
    }
  }

  function toggleGroup(header) {
    var items = header.nextElementSibling;
    items.classList.toggle('active');
    header.classList.toggle('expanded');
  }

  /* ============================
     LÀM ĐẸP CODE
     ============================ */
  function beautifyCode() {
    var code = editor.getValue();
    if (typeof js_beautify !== 'undefined') {
      var beautiful = js_beautify(code, {
        indent_size: 4,
        indent_char: ' ',
        max_preserve_newlines: 2,
        preserve_newlines: true,
        keep_array_indentation: false,
        break_chained_methods: false,
        wrap_line_length: 100,
        space_in_empty_paren: false,
        jslint_happy: true
      });
      editor.setValue(beautiful);
      showToast('✨ Code đã được làm đẹp và canh chỉnh!', 2000);
    } else {
      showToast('❌ Không tải được thư viện làm đẹp. Kiểm tra kết nối mạng.', 3000);
    }
    updateStats();
  }

  /* ============================
     TÍNH NĂNG MỚI: XÓA JS, MINIFY, TẢI FILE
     ============================ */

  // 1. Xoá toàn bộ thẻ script chuẩn xác với Regex multiline
  function removeScripts() {
    var code = editor.getValue();
    // [\\s\\S]*? sẽ quét sạch mọi thứ bao gồm cả xuống dòng bên trong thẻ script
    var newCode = code.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '');
    if (code === newCode) {
      showToast('Không tìm thấy thẻ <script> nào!', 2000);
    } else {
      editor.setValue(newCode);
      showToast('🚫 Đã xóa sạch toàn bộ thẻ <script>', 2000);
      updateStats();
      addHostToStatic();
    }
  }
  
  function addHostToStatic() {
  // 1. Lấy nội dung từ editor
	  var code = editor.getValue();
	  
	  // 2. Lấy giá trị host từ input và loại bỏ khoảng trắng thừa
	  var host = document.getElementById('frFind').value.trim();
	  
	  if (!host) {
	    showToast('⚠️ Vui lòng nhập domain vào ô tìm kiếm!', 2000);
	    return;
	  }
	
	  // 3. Chuẩn hóa host (Đảm bảo có http/https và không có dấu / ở cuối)
	  if (!/^https?:\/\//i.test(host)) {
	    host = 'https://' + host; // Mặc định thêm https nếu user chỉ gõ "domain.com"
	  }
	  host = host.replace(/\/+$/, ''); // Xóa dấu "/" ở cuối nếu user lỡ nhập "domain.com/"
	
	  // 4. Regex quét các đường dẫn bắt đầu bằng /static/ nằm trong dấu nháy
	  var regex = /(["'])\/(?!\/)([^"'\s]+)\1/g;

	
	  // 5. Thay thế và kiểm tra xem có thay đổi gì không
	  var newCode = code.replace(regex, `$1${host}/static/$2$1`);
	
	  if (code === newCode) {
	    showToast('Không tìm thấy đường dẫn /static/ nào phù hợp!', 2000);
	  } else {
	    editor.setValue(newCode);
	    showToast('✅ Đã thêm host vào toàn bộ đường dẫn /static/', 2000);
	    updateStats();
	  }
	}


  // 2. Rút gọn JS thành 1 dòng (Minify JS cơ bản)
  function minifyJS() {
    var code = editor.getValue();
    if(!code.trim()) return;
    var minified = code
      .replace(/\/\*[\s\S]*?\*\//g, '') // Xóa block comments
      .replace(/\/\/[^\n]*/g, '')      // Xóa line comments
      .replace(/\s+/g, ' ')            // Gom nhiều khoảng trắng thành 1
      .replace(/\{\s+/g, '{').replace(/\s+\}/g, '}') // Dọn khoảng trắng quanh {}
      .replace(/;\s+/g, ';').replace(/,\s+/g, ',')   // Dọn khoảng trắng quanh ;,
      .trim();
    editor.setValue(minified);
    showToast('📉 Code JS đã được rút gọn thành 1 dòng!', 2000);
    updateStats();
  }

  // 3. Rút gọn CSS thành 1 dòng (Minify CSS cơ bản)
  function minifyCSS() {
    var code = editor.getValue();
    if(!code.trim()) return;
    var minified = code
      .replace(/\/\*[\s\S]*?\*\//g, '') // Xóa css comments
      .replace(/\s+/g, ' ')            // Gom khoảng trắng
      .replace(/\s*{\s*/g, '{').replace(/\s*}\s*/g, '}') // Xóa khoảng trắng quanh {}
      .replace(/\s*:\s*/g, ':').replace(/\s*;\s*/g, ';') // Xóa khoảng trắng quanh :;
      .trim();
    editor.setValue(minified);
    showToast('📉 Code CSS đã được rút gọn thành 1 dòng!', 2000);
    updateStats();
  }

  // 4. Tải file đang chỉnh sửa về máy
  function downloadCode() {
    var code = editor.getValue();
    if (!code.trim()) { showToast('Không có nội dung để tải!', 2000); return; }
    
    // Tự động phán đoán tên file dựa vào code bên trong
    var isHtml = code.toLowerCase().indexOf('<html') !== -1 || code.toLowerCase().indexOf('<div') !== -1;
    var fileName = isHtml ? 'output.html' : 'output.js';

    var blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('💾 Đã lưu thành công file ' + fileName, 2000);
  }


  /* ============================
     FIND & REPLACE + HIGHLIGHT
     ============================ */
  var lastFrQuery = '';
  var lastFrRegex = false;
  var lastFrCase = false;

  function toggleFindReplace() {
    document.getElementById('findReplacePanel').classList.toggle('active');
  }

  function buildQuery() {
    var text = document.getElementById('frFind').value;
    var isRegex = document.getElementById('frRegex').checked;
    var caseFold = !document.getElementById('frCase').checked;
    if (!text) return null;
    if (isRegex) {
      try { return new RegExp(text, caseFold ? 'gi' : 'g'); } catch(e) { return null; }
    }
    return { query: text, caseFold: caseFold };
  }

  function updateSearchCount() {
    var q = buildQuery();
    var count = 0;
    if (q) {
      var cursor;
      if (q instanceof RegExp) {
        cursor = editor.getSearchCursor(q, null, { caseFold: false });
      } else {
        cursor = editor.getSearchCursor(q.query, null, { caseFold: q.caseFold });
      }
      while (cursor.findNext()) count++;
    }
    var el = document.getElementById('searchCount');
    if (count > 0) {
      el.textContent = '🔍 ' + count + ' kết quả';
    } else {
      el.textContent = '';
    }
  }

  function updateSearchHighlights() {
    clearSearchMarks();
    var q = buildQuery();
    if (!q) { updateSearchCount(); return; }
    var cursor;
    if (q instanceof RegExp) {
      cursor = editor.getSearchCursor(q, null, { caseFold: false });
    } else {
      cursor = editor.getSearchCursor(q.query, null, { caseFold: q.caseFold });
    }
    while (cursor.findNext()) {
      searchMarks.push(editor.markText(cursor.from(), cursor.to(), { className: 'search-highlight' }));
    }
    updateSearchCount();
  }

  // HÀM MỚI: Bộ nhớ đệm - Chỉ render lại highlight khi từ khoá thay đổi (chống lag tuyệt đối khi bấm Enter liên tục)
  function smartHighlight() {
    var text = document.getElementById('frFind').value;
    var isRegex = document.getElementById('frRegex').checked;
    var isCase = document.getElementById('frCase').checked;
    
    if (text !== lastFrQuery || isRegex !== lastFrRegex || isCase !== lastFrCase) {
      updateSearchHighlights();
      lastFrQuery = text;
      lastFrRegex = isRegex;
      lastFrCase = isCase;
    }
  }

  function findNext() {
    smartHighlight(); // <--- Chỉ đánh dấu màu khi bấm Tìm kiếm hoặc Enter
    var q = buildQuery();
    if (!q) { showToast('Nhập chuỗi cần tìm', 2000); return; }
    var cursor;
    if (q instanceof RegExp) {
      cursor = editor.getSearchCursor(q, editor.getCursor(), { caseFold: false });
    } else {
      cursor = editor.getSearchCursor(q.query, editor.getCursor(), { caseFold: q.caseFold });
    }
    if (cursor.findNext()) {
      editor.setSelection(cursor.from(), cursor.to());
      editor.scrollIntoView({ from: cursor.from(), to: cursor.to() }, 80);
    } else {
      if (q instanceof RegExp) {
        cursor = editor.getSearchCursor(q, null, { caseFold: false });
      } else {
        cursor = editor.getSearchCursor(q.query, null, { caseFold: q.caseFold });
      }
      if (cursor.findNext()) {
        editor.setSelection(cursor.from(), cursor.to());
        editor.scrollIntoView({ from: cursor.from(), to: cursor.to() }, 80);
      } else {
        showToast('Không tìm thấy', 2000);
      }
    }
  }

  function findPrev() {
    smartHighlight(); // <--- Chỉ đánh dấu màu khi bấm Tìm kiếm hoặc Enter
    var q = buildQuery();
    if (!q) { showToast('Nhập chuỗi cần tìm', 2000); return; }
    var start = editor.getCursor('start');
    var cursor;
    if (q instanceof RegExp) {
      cursor = editor.getSearchCursor(q, start, { caseFold: false });
    } else {
      cursor = editor.getSearchCursor(q.query, start, { caseFold: q.caseFold });
    }
    if (cursor.findPrevious()) {
      editor.setSelection(cursor.from(), cursor.to());
      editor.scrollIntoView({ from: cursor.from(), to: cursor.to() }, 80);
    } else {
      var lastLine = editor.lastLine();
      var lastCh = editor.getLine(lastLine).length;
      if (q instanceof RegExp) {
        cursor = editor.getSearchCursor(q, { line: lastLine, ch: lastCh }, { caseFold: false });
      } else {
        cursor = editor.getSearchCursor(q.query, { line: lastLine, ch: lastCh }, { caseFold: q.caseFold });
      }
      if (cursor.findPrevious()) {
        editor.setSelection(cursor.from(), cursor.to());
        editor.scrollIntoView({ from: cursor.from(), to: cursor.to() }, 80);
      } else {
        showToast('Không tìm thấy', 2000);
      }
    }
  }

  function replaceOne() {
    smartHighlight();
    var q = buildQuery();
    var rep = document.getElementById('frReplace').value;
    if (!q) { showToast('Nhập chuỗi cần tìm', 2000); return; }
    var from = editor.getCursor('start');
    var cursor;
    if (q instanceof RegExp) {
      cursor = editor.getSearchCursor(q, from, { caseFold: false });
    } else {
      cursor = editor.getSearchCursor(q.query, from, { caseFold: q.caseFold });
    }
    if (cursor.findNext()) {
      cursor.replace(rep);
      showToast('🔁 Đã thay 1 chỗ', 1800);
      updateSearchHighlights(); // Bắt buộc render lại sau khi thay đổi để tránh lệch màu
    } else {
      showToast('Không tìm thấy để thay', 2000);
    }
  }

  function replaceAll() {
    smartHighlight();
    var q = buildQuery();
    var rep = document.getElementById('frReplace').value;
    if (!q) { showToast('Nhập chuỗi cần tìm', 2000); return; }
    var count = 0;
    var cursor;
    if (q instanceof RegExp) {
      cursor = editor.getSearchCursor(q, null, { caseFold: false });
    } else {
      cursor = editor.getSearchCursor(q.query, null, { caseFold: q.caseFold });
    }
    editor.operation(function() {
      while (cursor.findNext()) {
        cursor.replace(rep);
        count++;
      }
    });
    showToast('🔂 Đã thay ' + count + ' chỗ', 2000);
    updateSearchHighlights(); // Bắt buộc render lại
    updateStats();
  }

  // Bắt sự kiện phím Enter
  document.getElementById('frFind').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); findNext(); }
  });
  
  // ❌ ĐÃ XÓA SỰ KIỆN 'input' TẠI ĐÂY - CHẤM DỨT TÌNH TRẠNG LAG

  // Xóa bộ nhớ đệm và vẽ lại màu ngay lập tức nếu tick vào ô Regex / Phân biệt hoa thường
  function forceRehighlight() {
    lastFrQuery = ''; 
    smartHighlight();
  }
  document.getElementById('frRegex').addEventListener('change', forceRehighlight);
  document.getElementById('frCase').addEventListener('change', forceRehighlight);



  /* ============================
     COPY / PASTE / CLEAR
     ============================ */
  function copyCode() {
    var code = editor.getValue();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(function() { showToast('📋 Đã copy toàn bộ code!', 2000); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('📋 Đã copy toàn bộ code!', 2000);
    }
  }

  function pasteCode() {
    if (navigator.clipboard) {
      navigator.clipboard.readText().then(function(text) {
        if (text) {
          editor.replaceSelection(text);
          showToast('📌 Đã paste vào vị trí con trỏ!', 2000);
          updateStats();
        }
      }).catch(function() {
        showToast('Trình duyệt chặn paste. Dùng Ctrl+V', 3000);
      });
    } else {
      showToast('Dùng Ctrl+V để paste', 2000);
    }
  }

  function clearCode() {
    if (confirm('Bạn có chắc muốn xóa toàn bộ code?')) {
      editor.setValue('');
      clearEditorErrors();
      clearSearchMarks();
      document.getElementById('errorList').innerHTML = '';
      document.getElementById('searchCount').textContent = '';
      updateStats();
      showToast('🗑 Đã xóa toàn bộ', 2000);
    }
  }

  /* ============================
     ẨN / HIỆN CỘT
     ============================ */
  function toggleCol(id) {
    var col = document.getElementById(id);
    col.classList.toggle('collapsed');
    setTimeout(function() { editor.refresh(); }, 360);
  }

  editor.on('change', function() { updateStats(); });
  updateStats();
</script>
